<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="30" height="30" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <defs>
    <filter id="page-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.8" dy="1" stdDeviation="1.5" flood-color="#4a6fa5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <style>
    .turning-page {
      transform-box: view-box;
      transform-origin: 15px 15px;
      animation: page-flip 3s ease-in-out infinite;
    }
    @keyframes page-flip {
      0%,  20% { transform: scaleX(1); }
      47%      { transform: scaleX(0); }
      74%, 85% { transform: scaleX(-1); }
      100%     { transform: scaleX(1); }
    }
  </style>

  <!-- Left page (static) -->
  <path d="M2.5 7 C2.5 7 6.5 5.5 10.5 5.5 C12 5.5 13.5 6 14.5 6.5 L14.5 25 C13.5 24.5 12 24 10.5 24 C6.5 24 2.5 25.5 2.5 25.5 Z"
        fill="#e3edf9" stroke="#4a6fa5" stroke-width="1.4"/>

  <!-- Left page text lines -->
  <line x1="4.5" y1="11"  x2="12.5" y2="10.5" stroke="#7a9cc8" stroke-width="0.85"/>
  <line x1="4.5" y1="14"  x2="12.5" y2="13.5" stroke="#7a9cc8" stroke-width="0.85"/>
  <line x1="4.5" y1="17"  x2="12.5" y2="16.5" stroke="#7a9cc8" stroke-width="0.85"/>
  <line x1="4.5" y1="20"  x2="9.5"  y2="19.7" stroke="#7a9cc8" stroke-width="0.85"/>

  <!-- Right page base (revealed as the full page lifts away) -->
  <path d="M27.5 7 C27.5 7 23.5 5.5 19.5 5.5 C18 5.5 16.5 6 15.5 6.5 L15.5 25 C16.5 24.5 18 24 19.5 24 C23.5 24 27.5 25.5 27.5 25.5 Z"
        fill="#d8e6f5" stroke="#4a6fa5" stroke-width="1.4"/>

  <!-- Right page base text lines (the next page, dimmed) -->
  <line x1="17.5" y1="11"  x2="25.5" y2="11.5" stroke="#7a9cc8" stroke-width="0.85" opacity="0.45"/>
  <line x1="17.5" y1="14"  x2="25.5" y2="14.5" stroke="#7a9cc8" stroke-width="0.85" opacity="0.45"/>
  <line x1="17.5" y1="17"  x2="25.5" y2="17.5" stroke="#7a9cc8" stroke-width="0.85" opacity="0.45"/>
  <line x1="17.5" y1="20"  x2="22"   y2="20.3" stroke="#7a9cc8" stroke-width="0.85" opacity="0.45"/>

  <!-- Spine (on top so it stays crisp as page passes) -->
  <line x1="15" y1="6.5" x2="15" y2="25" stroke="#4a6fa5" stroke-width="1.4"/>

  <!-- Animated turning page — the full right page flipping over to the left -->
  <g class="turning-page" filter="url(#page-shadow)">
    <path d="M27.5 7 C27.5 7 23.5 5.5 19.5 5.5 C18 5.5 16.5 6 15.5 6.5 L15.5 25 C16.5 24.5 18 24 19.5 24 C23.5 24 27.5 25.5 27.5 25.5 Z"
          fill="#f3f8ff" stroke="#4a6fa5" stroke-width="1.4"/>
    <line x1="17.5" y1="11"  x2="25.5" y2="11.5" stroke="#7a9cc8" stroke-width="0.85"/>
    <line x1="17.5" y1="14"  x2="25.5" y2="14.5" stroke="#7a9cc8" stroke-width="0.85"/>
    <line x1="17.5" y1="17"  x2="25.5" y2="17.5" stroke="#7a9cc8" stroke-width="0.85"/>
    <line x1="17.5" y1="20"  x2="22"   y2="20.3" stroke="#7a9cc8" stroke-width="0.85"/>
  </g>

</svg>
