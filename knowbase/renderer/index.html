<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline'; img-src 'self' data: https: file:; font-src 'self' data:;">
  <title>Knowbase</title>
  <link rel="stylesheet" id="hljs-theme" href="">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/markdown.css">
</head>
<body>
<div class="app-shell" id="app-shell">

  <!-- ── Left-edge panel resize ──────────────────────────────── -->
  <div id="edge-resize" class="edge-resize" title="Drag to resize panel"></div>

  <!-- ── Title bar ───────────────────────────────────────────── -->
  <header class="titlebar" id="titlebar">
    <button class="tb-btn" id="btn-sidebar-toggle" title="Toggle sidebar (⌘\)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <span class="tb-title" id="tb-title">Knowbase</span>

    <div class="tb-actions">
      <span class="tb-version" id="tb-version"></span>
      <button class="tb-btn" id="btn-theme" title="Toggle dark / light mode">
        <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>   <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/> <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <button class="tb-btn" id="btn-pin" title="Pin on top" data-pinned="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="17" x2="12" y2="22"/>
          <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24z"/>
        </svg>
      </button>

      <button class="tb-btn tb-btn-close" id="btn-hide" title="Hide panel (⌘⇧M)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Body row ─────────────────────────────────────────────── -->
  <div class="body-row">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="open-folder-btn" id="btn-open-folder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Open Folder…
        </button>
        <!-- New file button – only active when a folder is open -->
        <button class="new-file-top-btn" id="btn-new-file" title="New file (⌘N)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="file-tree" id="file-tree">
        <div class="empty-hint" id="empty-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
          </svg>
          <p>Open a folder<br>to get started</p>
          <kbd id="kbd-shortcut">⌘⇧M</kbd>
        </div>
      </div>
    </aside>

    <!-- Sidebar ↔ content resizer -->
    <div class="sidebar-resizer" id="sidebar-resizer"></div>

    <!-- Content -->
    <main class="content" id="content">

      <!-- Per-file toolbar (shown when a file is open) -->
      <div class="ct-bar" id="ct-bar" style="display:none">
        <span class="ct-file" id="ct-file"></span>
        <div class="ct-actions">
          <!-- View mode: show Edit button -->
          <button class="tb-btn" id="btn-edit-mode" title="Edit file (⌘E)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <!-- Edit mode: Save + Preview buttons -->
          <button class="tb-btn ct-edit-only" id="btn-save" title="Save (⌘S)" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17,21 17,13 7,13 7,21"/>
              <polyline points="7,3 7,8 15,8"/>
            </svg>
          </button>
          <button class="tb-btn ct-edit-only" id="btn-view-mode" title="Preview (⌘E)" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64" class="welcome-icon">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10,9 9,9 8,9"/>
          </svg>
          <h2>Knowbase</h2>
          <p>Select a file from the sidebar to start reading.</p>
          <div class="welcome-shortcuts">
            <div class="shortcut-row"><kbd>⌘⇧M</kbd><span>Toggle panel</span></div>
            <div class="shortcut-row"><kbd>Esc</kbd><span>Hide panel</span></div>
            <div class="shortcut-row"><kbd>⌘\</kbd><span>Toggle sidebar</span></div>
            <div class="shortcut-row"><kbd>⌘N</kbd><span>New file</span></div>
          </div>
        </div>
      </div>

      <!-- Markdown preview -->
      <div class="md-scroll" id="md-scroll" style="display:none">
        <article class="markdown-body" id="markdown-body"></article>
      </div>

      <!-- Markdown editor -->
      <div class="editor-wrap" id="editor-wrap" style="display:none">
        <textarea class="md-editor" id="md-editor"
                  spellcheck="false"
                  placeholder="Write markdown here…"></textarea>
      </div>

    </main>
  </div>

  <!-- ── Status bar ────────────────────────────────────────────── -->
  <footer class="statusbar" id="statusbar">
    <span class="status-file" id="status-file">No file open</span>
    <span class="status-meta" id="status-meta"></span>
  </footer>

</div>
<script src="js/app.js"></script>
</body>
</html>
